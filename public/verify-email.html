<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email</title>
<style>
:root {
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --bg: #f9fafb;
  --card-bg: #ffffff;
  --text: #111827;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --error: #ef4444;
  --success: #10b981;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06); padding: 2rem; width: 100%; max-width: 420px; text-align: center; }
h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .25rem; }
.subtitle { color: var(--text-secondary); font-size: .875rem; margin-bottom: 1.5rem; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: .625rem 1rem;
  border: none; border-radius: var(--radius); font-size: .875rem; font-weight: 600; cursor: pointer;
  transition: background .15s, opacity .15s; text-decoration: none;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; }
.btn-outline { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--bg); }
.msg { padding: .75rem; border-radius: var(--radius); font-size: .875rem; margin-bottom: 1rem; display: none; }
.msg.error { display: block; background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
.msg.success { display: block; background: #ecfdf5; color: var(--success); border: 1px solid #a7f3d0; }
.icon { margin: 0 auto 1rem; width: 64px; height: 64px; }
.icon.loading { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.links { text-align: center; margin-top: 1.25rem; font-size: .875rem; color: var(--text-secondary); }
.links a { color: var(--primary); text-decoration: none; font-weight: 500; }
.links a:hover { text-decoration: underline; }
.hidden { display: none !important; }
.btn-group { display: flex; flex-direction: column; gap: .5rem; margin-top: 1rem; }
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="iconLoading">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" width="64" height="64" class="loading">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
    </svg>
  </div>
  <div class="icon hidden" id="iconSuccess">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" width="64" height="64">
      <circle cx="12" cy="12" r="10"/><path d="M8 12l2.5 2.5L16 9"/>
    </svg>
  </div>
  <div class="icon hidden" id="iconError">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2" width="64" height="64">
      <circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/>
    </svg>
  </div>

  <h1 id="title">Verifying your email...</h1>
  <p class="subtitle" id="subtitle">Please wait while we verify your email address.</p>

  <div id="msg" class="msg"></div>

  <div class="btn-group hidden" id="actions">
    <button class="btn btn-primary hidden" id="resendBtn" type="button">Resend verification email</button>
    <a href="login.html" class="btn btn-outline">Go to login</a>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('api_key')) localStorage.setItem('auth_api_key', params.get('api_key'));
  var apiKey = localStorage.getItem('auth_api_key') || '';
  var accessToken = localStorage.getItem('auth_access_token') || '';
  var token = params.get('token');

  function headers(auth) {
    var h = { 'Content-Type': 'application/json' };
    if (apiKey) h['X-API-Key'] = apiKey;
    if (auth && accessToken) h['Authorization'] = 'Bearer ' + accessToken;
    return h;
  }

  function showState(state, title, subtitle, msgText, msgType) {
    document.getElementById('iconLoading').classList.add('hidden');
    document.getElementById('iconSuccess').classList.add('hidden');
    document.getElementById('iconError').classList.add('hidden');
    document.getElementById('icon' + state).classList.remove('hidden');
    document.getElementById('title').textContent = title;
    document.getElementById('subtitle').textContent = subtitle;
    document.getElementById('actions').classList.remove('hidden');
    if (msgText) {
      var el = document.getElementById('msg');
      el.textContent = msgText;
      el.className = 'msg ' + msgType;
    }
  }

  if (!token) {
    showState('Error', 'Missing token', 'No verification token was provided in the URL.', 'Please check the link in your email.', 'error');
    if (accessToken) document.getElementById('resendBtn').classList.remove('hidden');
    return;
  }

  // Auto-verify on load
  (async function() {
    try {
      var res = await fetch('/api/auth/verify-email', {
        method: 'POST',
        headers: headers(false),
        body: JSON.stringify({ token: token })
      });
      var data = await res.json();
      if (res.ok) {
        showState('Success', 'Email verified!', 'Your email address has been successfully verified.', '', '');
      } else {
        showState('Error', 'Verification failed', data.error || 'The token is invalid or has expired.', data.error || 'Invalid or expired token.', 'error');
        if (accessToken) document.getElementById('resendBtn').classList.remove('hidden');
      }
    } catch (err) {
      showState('Error', 'Network error', 'Could not reach the server. Please try again.', 'Network error', 'error');
      if (accessToken) document.getElementById('resendBtn').classList.remove('hidden');
    }
  })();

  // Resend
  document.getElementById('resendBtn').addEventListener('click', async function() {
    var btn = this;
    btn.disabled = true;
    btn.textContent = 'Sending...';
    try {
      var res = await fetch('/api/auth/resend-verification', {
        method: 'POST',
        headers: headers(true),
        credentials: 'include'
      });
      var data = await res.json();
      if (res.ok) {
        var el = document.getElementById('msg');
        el.textContent = 'Verification email sent! Check your inbox.';
        el.className = 'msg success';
      } else {
        var el = document.getElementById('msg');
        el.textContent = data.error || 'Could not resend.';
        el.className = 'msg error';
      }
    } catch (err) {
      var el = document.getElementById('msg');
      el.textContent = 'Network error.';
      el.className = 'msg error';
    }
    btn.disabled = false;
    btn.textContent = 'Resend verification email';
  });
})();
</script>
</body>
</html>
