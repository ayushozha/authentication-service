<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
:root {
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --bg: #f9fafb;
  --card-bg: #ffffff;
  --text: #111827;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --error: #ef4444;
  --success: #10b981;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06); padding: 2rem; width: 100%; max-width: 420px; }
h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .25rem; }
.subtitle { color: var(--text-secondary); font-size: .875rem; margin-bottom: 1.5rem; }
label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .25rem; }
input[type="email"], input[type="password"], input[type="text"] {
  width: 100%; padding: .625rem .75rem; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: .875rem; outline: none; transition: border-color .15s;
}
input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
.field { margin-bottom: 1rem; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: .625rem 1rem;
  border: none; border-radius: var(--radius); font-size: .875rem; font-weight: 600; cursor: pointer;
  transition: background .15s, opacity .15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; }
.btn-outline {
  background: var(--card-bg); color: var(--text); border: 1px solid var(--border);
}
.btn-outline:hover { background: var(--bg); }
.divider { display: flex; align-items: center; gap: .75rem; margin: 1.25rem 0; color: var(--text-secondary); font-size: .75rem; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.msg { padding: .75rem; border-radius: var(--radius); font-size: .875rem; margin-bottom: 1rem; display: none; }
.msg.error { display: block; background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
.msg.success { display: block; background: #ecfdf5; color: var(--success); border: 1px solid #a7f3d0; }
.links { text-align: center; margin-top: 1.25rem; font-size: .875rem; color: var(--text-secondary); }
.links a { color: var(--primary); text-decoration: none; font-weight: 500; }
.links a:hover { text-decoration: underline; }
.remember { display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem; font-size: .875rem; }
.remember input { width: auto; }
.oauth-buttons { display: flex; flex-direction: column; gap: .5rem; margin-bottom: .5rem; }
.oauth-buttons .btn { gap: .5rem; }
.oauth-buttons svg { width: 18px; height: 18px; }
.hidden { display: none !important; }
.totp-section { margin-top: 1rem; }
.totp-section input { text-align: center; font-size: 1.25rem; letter-spacing: .5rem; }
</style>
</head>
<body>
<div class="card">
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your account</p>

  <div id="msg" class="msg"></div>

  <!-- Login Form -->
  <form id="loginForm">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="username webauthn" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
    </div>
    <div class="remember">
      <input type="checkbox" id="remember" name="remember">
      <label for="remember" style="margin-bottom:0">Remember me</label>
    </div>
    <button type="submit" class="btn btn-primary" id="loginBtn">Sign in</button>
  </form>

  <!-- TOTP Section (hidden by default) -->
  <div id="totpSection" class="totp-section hidden">
    <p class="subtitle">Enter the 6-digit code from your authenticator app</p>
    <form id="totpForm">
      <div class="field">
        <input type="text" id="totpCode" maxlength="6" pattern="[0-9]{6}" required placeholder="000000" autocomplete="one-time-code">
      </div>
      <div class="field hidden" id="recoveryCodeField">
        <input type="text" id="recoveryCode" placeholder="ABCD-1234-EF56" autocomplete="one-time-code">
      </div>
      <input type="hidden" id="twoFactorToken">
      <button type="submit" class="btn btn-primary" id="totpBtn">Verify</button>
    </form>
    <div class="links" style="margin-top:.75rem">
      <a href="#" id="recoveryCodeToggle">Use recovery code</a>
      <span style="margin:0 .25rem">&middot;</span>
      <a href="#" id="backToLogin">Back to login</a>
    </div>
  </div>

  <!-- Passkey Button -->
  <div class="divider">or</div>
  <button class="btn btn-outline" id="passkeyBtn" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="16" r="1"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    Sign in with Passkey
  </button>

  <!-- OAuth Buttons -->
  <div id="oauthSection" class="hidden">
    <div class="divider">or continue with</div>
    <div class="oauth-buttons" id="oauthButtons"></div>
  </div>

  <div class="links">
    <a href="forgot-password.html">Forgot password?</a>
    <span style="margin:0 .25rem">&middot;</span>
    <a href="#" id="magicLinkToggle">Magic link</a>
    <br><br>
    Don't have an account? <a href="signup.html">Sign up</a>
  </div>

  <!-- Magic Link Section (hidden) -->
  <div id="magicSection" class="hidden" style="margin-top:1rem;">
    <div class="divider">magic link login</div>
    <form id="magicForm">
      <div class="field">
        <label for="magicEmail">Email</label>
        <input type="email" id="magicEmail" required placeholder="you@example.com">
      </div>
      <button type="submit" class="btn btn-primary">Send magic link</button>
    </form>
  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);

  // API key handling
  if (params.get('api_key')) localStorage.setItem('auth_api_key', params.get('api_key'));
  const apiKey = localStorage.getItem('auth_api_key') || '';

  // If redirected with access_token (from OAuth/magic link)
  if (params.get('access_token')) {
    localStorage.setItem('auth_access_token', params.get('access_token'));
    showMsg('Login successful! Redirecting...', 'success');
    return;
  }

  // If redirected with error
  if (params.get('error')) showMsg(params.get('error'), 'error');

  function headers(extra) {
    const h = { 'Content-Type': 'application/json' };
    if (apiKey) h['X-API-Key'] = apiKey;
    return Object.assign(h, extra || {});
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function clearMsg() {
    const el = document.getElementById('msg');
    el.className = 'msg';
    el.textContent = '';
  }

  let conditionalPasskeyAbort = null;
  let usingRecoveryCode = false;

  function abortConditionalPasskey() {
    if (conditionalPasskeyAbort) {
      conditionalPasskeyAbort.abort();
      conditionalPasskeyAbort = null;
    }
  }

  function decodePasskeyOptions(options) {
    options.publicKey.challenge = base64urlToBuffer(options.publicKey.challenge);
    if (options.publicKey.allowCredentials) {
      options.publicKey.allowCredentials = options.publicKey.allowCredentials.map(function(c) {
        c.id = base64urlToBuffer(c.id);
        return c;
      });
    }
    return options;
  }

  async function finishPasskeyLogin(sessionId, credential) {
    const finishRes = await fetch('/api/auth/passkey/login/finish?session_id=' + encodeURIComponent(sessionId), {
      method: 'POST',
      headers: headers(),
      credentials: 'include',
      body: JSON.stringify({
        id: credential.id,
        rawId: bufferToBase64url(credential.rawId),
        type: credential.type,
        response: {
          authenticatorData: bufferToBase64url(credential.response.authenticatorData),
          clientDataJSON: bufferToBase64url(credential.response.clientDataJSON),
          signature: bufferToBase64url(credential.response.signature),
          userHandle: credential.response.userHandle ? bufferToBase64url(credential.response.userHandle) : null
        }
      })
    });
    const data = await finishRes.json();
    if (!finishRes.ok) throw new Error(data.error || 'Passkey login failed');
    if (data.access_token) {
      localStorage.setItem('auth_access_token', data.access_token);
      showMsg('Login successful!', 'success');
    }
    return data;
  }

  async function runPasskeyLogin(mediation, signal) {
    const beginRes = await fetch('/api/auth/passkey/login/begin', {
      method: 'POST',
      headers: headers(),
      credentials: 'include'
    });
    if (!beginRes.ok) {
      const d = await beginRes.json();
      throw new Error(d.error || 'Passkey not available');
    }
    const options = decodePasskeyOptions(await beginRes.json());
    const credentialRequest = { publicKey: options.publicKey };
    if (mediation) credentialRequest.mediation = mediation;
    if (signal) credentialRequest.signal = signal;
    const credential = await navigator.credentials.get(credentialRequest);
    return finishPasskeyLogin(options.session_id || '', credential);
  }

  // Login form
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    abortConditionalPasskey();
    clearMsg();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: headers(),
        credentials: 'include',
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) {
        showMsg(data.error || 'Login failed', 'error');
        btn.disabled = false;
        btn.textContent = 'Sign in';
        return;
      }
      if (data.requires_2fa) {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('totpSection').classList.remove('hidden');
        document.getElementById('twoFactorToken').value = data.two_factor_token;
        document.getElementById('totpCode').focus();
        btn.disabled = false;
        btn.textContent = 'Sign in';
        return;
      }
      if (data.access_token) {
        localStorage.setItem('auth_access_token', data.access_token);
        showMsg('Login successful!', 'success');
      }
    } catch (err) {
      showMsg('Network error. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });

  // TOTP form
  document.getElementById('totpForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearMsg();
    const btn = document.getElementById('totpBtn');
    btn.disabled = true;
    btn.textContent = 'Verifying...';
    try {
      const res = await fetch(usingRecoveryCode ? '/api/auth/recovery-codes/verify' : '/api/auth/totp/verify', {
        method: 'POST',
        headers: headers(),
        credentials: 'include',
        body: JSON.stringify({
          two_factor_token: document.getElementById('twoFactorToken').value,
          code: usingRecoveryCode ? document.getElementById('recoveryCode').value : document.getElementById('totpCode').value
        })
      });
      const data = await res.json();
      if (!res.ok) {
        showMsg(data.error || 'Invalid code', 'error');
        btn.disabled = false;
        btn.textContent = 'Verify';
        return;
      }
      if (data.access_token) {
        localStorage.setItem('auth_access_token', data.access_token);
        showMsg('Login successful!', 'success');
      }
    } catch (err) {
      showMsg('Network error. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Verify';
    }
  });

  document.getElementById('recoveryCodeToggle').addEventListener('click', function(e) {
    e.preventDefault();
    usingRecoveryCode = !usingRecoveryCode;
    document.getElementById('recoveryCodeField').classList.toggle('hidden', !usingRecoveryCode);
    document.getElementById('totpCode').parentElement.classList.toggle('hidden', usingRecoveryCode);
    document.getElementById('totpCode').required = !usingRecoveryCode;
    document.getElementById('recoveryCode').required = usingRecoveryCode;
    document.getElementById('recoveryCodeToggle').textContent = usingRecoveryCode ? 'Use authenticator code' : 'Use recovery code';
    (usingRecoveryCode ? document.getElementById('recoveryCode') : document.getElementById('totpCode')).focus();
  });

  // Back to login
  document.getElementById('backToLogin').addEventListener('click', function(e) {
    e.preventDefault();
    document.getElementById('totpSection').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    usingRecoveryCode = false;
    document.getElementById('recoveryCodeField').classList.add('hidden');
    document.getElementById('totpCode').parentElement.classList.remove('hidden');
    document.getElementById('totpCode').required = true;
    document.getElementById('recoveryCode').required = false;
    document.getElementById('recoveryCodeToggle').textContent = 'Use recovery code';
    clearMsg();
  });

  // Passkey login
  document.getElementById('passkeyBtn').addEventListener('click', async function() {
    abortConditionalPasskey();
    clearMsg();
    try {
      await runPasskeyLogin();
    } catch (err) {
      if (err.name !== 'AbortError') showMsg(err.message || 'Passkey login failed or was cancelled.', 'error');
    }
  });

  // Magic link toggle
  document.getElementById('magicLinkToggle').addEventListener('click', function(e) {
    e.preventDefault();
    document.getElementById('magicSection').classList.toggle('hidden');
  });

  // Magic link form
  document.getElementById('magicForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearMsg();
    try {
      const res = await fetch('/api/auth/magic-link/send', {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ email: document.getElementById('magicEmail').value })
      });
      const data = await res.json();
      if (!res.ok) {
        showMsg(data.error || 'Could not send magic link', 'error');
        return;
      }
      showMsg('Magic link sent! Check your email.', 'success');
    } catch (err) {
      showMsg('Network error. Please try again.', 'error');
    }
  });

  // OAuth provider detection
  var oauthProviders = [
    { name: 'google', label: 'Google', color: '#4285f4', icon: '<svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>' },
    { name: 'github', label: 'GitHub', color: '#333', icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/></svg>' },
    { name: 'microsoft', label: 'Microsoft', color: '#00a4ef', icon: '<svg viewBox="0 0 24 24"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="13" y="1" width="10" height="10" fill="#7fba00"/><rect x="1" y="13" width="10" height="10" fill="#00a4ef"/><rect x="13" y="13" width="10" height="10" fill="#ffb900"/></svg>' },
    { name: 'apple', label: 'Apple', color: '#000', icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>' }
  ];

  // Try to detect configured providers by making a test request
  (async function() {
    var btns = document.getElementById('oauthButtons');
    var anyProvider = false;
    for (var i = 0; i < oauthProviders.length; i++) {
      var p = oauthProviders[i];
      try {
        var res = await fetch('/api/auth/oauth/' + p.name, { method: 'GET', headers: headers(), redirect: 'manual' });
        // If it doesn't 404, provider is configured
        if (res.status !== 404 && res.status !== 405) {
          anyProvider = true;
          var btn = document.createElement('a');
          btn.href = '/api/auth/oauth/' + p.name + (apiKey ? '?api_key=' + encodeURIComponent(apiKey) : '');
          btn.className = 'btn btn-outline';
          btn.innerHTML = p.icon + ' Continue with ' + p.label;
          btns.appendChild(btn);
        }
      } catch (err) { /* skip */ }
    }
    if (anyProvider) document.getElementById('oauthSection').classList.remove('hidden');
  })();

  // WebAuthn helpers
  function base64urlToBuffer(b64) {
    var s = b64.replace(/-/g, '+').replace(/_/g, '/');
    while (s.length % 4) s += '=';
    var raw = atob(s);
    var arr = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr.buffer;
  }
  function bufferToBase64url(buf) {
    var bytes = new Uint8Array(buf);
    var str = '';
    for (var i = 0; i < bytes.length; i++) str += String.fromCharCode(bytes[i]);
    return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  async function startConditionalPasskeyLogin() {
    if (!apiKey || !window.PublicKeyCredential || !navigator.credentials || !PublicKeyCredential.isConditionalMediationAvailable || !window.AbortController) return;
    try {
      const available = await PublicKeyCredential.isConditionalMediationAvailable();
      if (!available) return;
      conditionalPasskeyAbort = new AbortController();
      await runPasskeyLogin('conditional', conditionalPasskeyAbort.signal);
    } catch (err) {
      if (err.name !== 'AbortError' && err.name !== 'NotAllowedError') return;
    } finally {
      conditionalPasskeyAbort = null;
    }
  }

  startConditionalPasskeyLogin();
})();
</script>
</body>
</html>
