<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<style>
:root {
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --bg: #f9fafb;
  --card-bg: #ffffff;
  --text: #111827;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --error: #ef4444;
  --success: #10b981;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06); padding: 2rem; width: 100%; max-width: 420px; }
h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .25rem; }
.subtitle { color: var(--text-secondary); font-size: .875rem; margin-bottom: 1.5rem; }
label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .25rem; }
input[type="password"] {
  width: 100%; padding: .625rem .75rem; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: .875rem; outline: none; transition: border-color .15s;
}
input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
.field { margin-bottom: 1rem; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: .625rem 1rem;
  border: none; border-radius: var(--radius); font-size: .875rem; font-weight: 600; cursor: pointer;
  transition: background .15s, opacity .15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; }
.msg { padding: .75rem; border-radius: var(--radius); font-size: .875rem; margin-bottom: 1rem; display: none; }
.msg.error { display: block; background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
.msg.success { display: block; background: #ecfdf5; color: var(--success); border: 1px solid #a7f3d0; }
.links { text-align: center; margin-top: 1.25rem; font-size: .875rem; color: var(--text-secondary); }
.links a { color: var(--primary); text-decoration: none; font-weight: 500; }
.links a:hover { text-decoration: underline; }
.strength-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: .375rem; overflow: hidden; }
.strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }
.strength-label { font-size: .75rem; color: var(--text-secondary); margin-top: .25rem; }
</style>
</head>
<body>
<div class="card">
  <h1>Reset your password</h1>
  <p class="subtitle">Enter your new password below.</p>

  <div id="msg" class="msg"></div>

  <form id="resetForm">
    <div class="field">
      <label for="password">New password</label>
      <input type="password" id="password" name="password" required placeholder="Enter new password" autocomplete="new-password">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <div class="field">
      <label for="confirmPassword">Confirm new password</label>
      <input type="password" id="confirmPassword" name="confirm_password" required placeholder="Confirm new password" autocomplete="new-password">
    </div>
    <button type="submit" class="btn btn-primary" id="resetBtn">Reset password</button>
  </form>

  <div class="links">
    <a href="login.html">Back to login</a>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('api_key')) localStorage.setItem('auth_api_key', params.get('api_key'));
  var apiKey = localStorage.getItem('auth_api_key') || '';
  var token = params.get('token') || '';

  function headers() {
    var h = { 'Content-Type': 'application/json' };
    if (apiKey) h['X-API-Key'] = apiKey;
    return h;
  }

  function showMsg(text, type) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  if (!token) {
    showMsg('Missing reset token. Please use the link from your email.', 'error');
    document.getElementById('resetForm').style.display = 'none';
  }

  // Password strength
  var pwInput = document.getElementById('password');
  var fill = document.getElementById('strengthFill');
  var label = document.getElementById('strengthLabel');

  pwInput.addEventListener('input', function() {
    var pw = pwInput.value;
    var score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^a-zA-Z0-9]/.test(pw)) score++;

    var levels = [
      { width: '0%', color: 'var(--border)', text: '' },
      { width: '20%', color: '#ef4444', text: 'Very weak' },
      { width: '40%', color: '#f97316', text: 'Weak' },
      { width: '60%', color: '#eab308', text: 'Fair' },
      { width: '80%', color: '#22c55e', text: 'Strong' },
      { width: '100%', color: '#10b981', text: 'Very strong' }
    ];
    var lvl = levels[score];
    fill.style.width = lvl.width;
    fill.style.background = lvl.color;
    label.textContent = lvl.text;
    label.style.color = lvl.color;
  });

  // Reset form
  document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var pw = document.getElementById('password').value;
    var confirm = document.getElementById('confirmPassword').value;

    if (pw !== confirm) {
      showMsg('Passwords do not match.', 'error');
      return;
    }
    if (pw.length < 8) {
      showMsg('Password must be at least 8 characters.', 'error');
      return;
    }

    var btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.textContent = 'Resetting...';

    try {
      var res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ token: token, new_password: pw })
      });
      var data = await res.json();
      if (!res.ok) {
        showMsg(data.error || 'Reset failed', 'error');
        btn.disabled = false;
        btn.textContent = 'Reset password';
        return;
      }
      showMsg('Password reset successful! You can now sign in with your new password.', 'success');
      document.getElementById('resetForm').style.display = 'none';
    } catch (err) {
      showMsg('Network error. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Reset password';
    }
  });
})();
</script>
</body>
</html>
