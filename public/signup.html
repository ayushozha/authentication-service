<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<style>
:root {
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --bg: #f9fafb;
  --card-bg: #ffffff;
  --text: #111827;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --error: #ef4444;
  --success: #10b981;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06); padding: 2rem; width: 100%; max-width: 420px; }
h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .25rem; }
.subtitle { color: var(--text-secondary); font-size: .875rem; margin-bottom: 1.5rem; }
label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .25rem; }
input[type="email"], input[type="password"], input[type="text"] {
  width: 100%; padding: .625rem .75rem; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: .875rem; outline: none; transition: border-color .15s;
}
input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
.field { margin-bottom: 1rem; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: .625rem 1rem;
  border: none; border-radius: var(--radius); font-size: .875rem; font-weight: 600; cursor: pointer;
  transition: background .15s, opacity .15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; }
.btn-outline { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); text-decoration: none; }
.btn-outline:hover { background: var(--bg); }
.divider { display: flex; align-items: center; gap: .75rem; margin: 1.25rem 0; color: var(--text-secondary); font-size: .75rem; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.msg { padding: .75rem; border-radius: var(--radius); font-size: .875rem; margin-bottom: 1rem; display: none; }
.msg.error { display: block; background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
.msg.success { display: block; background: #ecfdf5; color: var(--success); border: 1px solid #a7f3d0; }
.links { text-align: center; margin-top: 1.25rem; font-size: .875rem; color: var(--text-secondary); }
.links a { color: var(--primary); text-decoration: none; font-weight: 500; }
.links a:hover { text-decoration: underline; }
.strength-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: .375rem; overflow: hidden; }
.strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }
.strength-label { font-size: .75rem; color: var(--text-secondary); margin-top: .25rem; }
.tos { display: flex; align-items: flex-start; gap: .5rem; margin-bottom: 1rem; font-size: .8125rem; color: var(--text-secondary); }
.tos input { width: auto; margin-top: 2px; }
.tos a { color: var(--primary); text-decoration: none; }
.oauth-buttons { display: flex; flex-direction: column; gap: .5rem; }
.oauth-buttons .btn { gap: .5rem; }
.oauth-buttons svg { width: 18px; height: 18px; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="card">
  <h1>Create an account</h1>
  <p class="subtitle">Get started with your free account</p>

  <div id="msg" class="msg"></div>

  <form id="signupForm">
    <div class="field">
      <label for="name">Full name</label>
      <input type="text" id="name" name="display_name" required placeholder="John Doe" autocomplete="name">
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="Create a password" autocomplete="new-password">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <div class="field">
      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" name="confirm_password" required placeholder="Confirm your password" autocomplete="new-password">
    </div>
    <div class="tos">
      <input type="checkbox" id="tos" required>
      <label for="tos" style="margin-bottom:0;font-weight:400">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
    </div>
    <button type="submit" class="btn btn-primary" id="signupBtn">Create account</button>
  </form>

  <!-- OAuth Buttons -->
  <div id="oauthSection" class="hidden">
    <div class="divider">or sign up with</div>
    <div class="oauth-buttons" id="oauthButtons"></div>
  </div>

  <div class="links">
    Already have an account? <a href="login.html">Sign in</a>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('api_key')) localStorage.setItem('auth_api_key', params.get('api_key'));
  var apiKey = localStorage.getItem('auth_api_key') || '';

  function headers() {
    var h = { 'Content-Type': 'application/json' };
    if (apiKey) h['X-API-Key'] = apiKey;
    return h;
  }

  function showMsg(text, type) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function clearMsg() {
    var el = document.getElementById('msg');
    el.className = 'msg';
    el.textContent = '';
  }

  // Password strength
  var pwInput = document.getElementById('password');
  var fill = document.getElementById('strengthFill');
  var label = document.getElementById('strengthLabel');

  pwInput.addEventListener('input', function() {
    var pw = pwInput.value;
    var score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^a-zA-Z0-9]/.test(pw)) score++;

    var levels = [
      { width: '0%', color: 'var(--border)', text: '' },
      { width: '20%', color: '#ef4444', text: 'Very weak' },
      { width: '40%', color: '#f97316', text: 'Weak' },
      { width: '60%', color: '#eab308', text: 'Fair' },
      { width: '80%', color: '#22c55e', text: 'Strong' },
      { width: '100%', color: '#10b981', text: 'Very strong' }
    ];
    var lvl = levels[score];
    fill.style.width = lvl.width;
    fill.style.background = lvl.color;
    label.textContent = lvl.text;
    label.style.color = lvl.color;
  });

  // Signup form
  document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearMsg();

    var pw = document.getElementById('password').value;
    var confirm = document.getElementById('confirmPassword').value;
    if (pw !== confirm) {
      showMsg('Passwords do not match.', 'error');
      return;
    }
    if (pw.length < 8) {
      showMsg('Password must be at least 8 characters.', 'error');
      return;
    }

    var btn = document.getElementById('signupBtn');
    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      var res = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: headers(),
        credentials: 'include',
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: pw,
          display_name: document.getElementById('name').value
        })
      });
      var data = await res.json();
      if (!res.ok) {
        showMsg(data.error || 'Signup failed', 'error');
        btn.disabled = false;
        btn.textContent = 'Create account';
        return;
      }
      if (data.access_token) {
        localStorage.setItem('auth_access_token', data.access_token);
      }
      showMsg('Account created! Please check your email to verify your address.', 'success');
      document.getElementById('signupForm').reset();
    } catch (err) {
      showMsg('Network error. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  });

  // OAuth provider detection
  var oauthProviders = [
    { name: 'google', label: 'Google', icon: '<svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>' },
    { name: 'github', label: 'GitHub', icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/></svg>' },
    { name: 'microsoft', label: 'Microsoft', icon: '<svg viewBox="0 0 24 24"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="13" y="1" width="10" height="10" fill="#7fba00"/><rect x="1" y="13" width="10" height="10" fill="#00a4ef"/><rect x="13" y="13" width="10" height="10" fill="#ffb900"/></svg>' },
    { name: 'apple', label: 'Apple', icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>' }
  ];

  (async function() {
    var btns = document.getElementById('oauthButtons');
    var any = false;
    for (var i = 0; i < oauthProviders.length; i++) {
      var p = oauthProviders[i];
      try {
        var res = await fetch('/api/auth/oauth/' + p.name, { method: 'GET', headers: headers(), redirect: 'manual' });
        if (res.status !== 404 && res.status !== 405) {
          any = true;
          var a = document.createElement('a');
          a.href = '/api/auth/oauth/' + p.name + (apiKey ? '?api_key=' + encodeURIComponent(apiKey) : '');
          a.className = 'btn btn-outline';
          a.innerHTML = p.icon + ' Continue with ' + p.label;
          btns.appendChild(a);
        }
      } catch (err) {}
    }
    if (any) document.getElementById('oauthSection').classList.remove('hidden');
  })();
})();
</script>
</body>
</html>
