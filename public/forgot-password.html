<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<style>
:root {
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --bg: #f9fafb;
  --card-bg: #ffffff;
  --text: #111827;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --error: #ef4444;
  --success: #10b981;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06); padding: 2rem; width: 100%; max-width: 420px; }
h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .25rem; }
.subtitle { color: var(--text-secondary); font-size: .875rem; margin-bottom: 1.5rem; }
label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .25rem; }
input[type="email"] {
  width: 100%; padding: .625rem .75rem; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: .875rem; outline: none; transition: border-color .15s;
}
input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
.field { margin-bottom: 1rem; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: .625rem 1rem;
  border: none; border-radius: var(--radius); font-size: .875rem; font-weight: 600; cursor: pointer;
  transition: background .15s, opacity .15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; }
.msg { padding: .75rem; border-radius: var(--radius); font-size: .875rem; margin-bottom: 1rem; display: none; }
.msg.error { display: block; background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
.msg.success { display: block; background: #ecfdf5; color: var(--success); border: 1px solid #a7f3d0; }
.links { text-align: center; margin-top: 1.25rem; font-size: .875rem; color: var(--text-secondary); }
.links a { color: var(--primary); text-decoration: none; font-weight: 500; }
.links a:hover { text-decoration: underline; }
.back-icon { display: inline-flex; align-items: center; gap: .25rem; margin-bottom: 1.5rem; font-size: .875rem; color: var(--text-secondary); text-decoration: none; }
.back-icon:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <a href="login.html" class="back-icon">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to login
  </a>

  <h1>Forgot password?</h1>
  <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

  <div id="msg" class="msg"></div>

  <form id="forgotForm">
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
    </div>
    <button type="submit" class="btn btn-primary" id="submitBtn">Send reset link</button>
  </form>

  <div class="links">
    Remember your password? <a href="login.html">Sign in</a>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('api_key')) localStorage.setItem('auth_api_key', params.get('api_key'));
  var apiKey = localStorage.getItem('auth_api_key') || '';

  function headers() {
    var h = { 'Content-Type': 'application/json' };
    if (apiKey) h['X-API-Key'] = apiKey;
    return h;
  }

  document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    var msgEl = document.getElementById('msg');
    msgEl.className = 'msg';

    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
      var res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ email: document.getElementById('email').value })
      });
      await res.json();
      // Always show success to prevent email enumeration
      msgEl.textContent = 'If an account exists with that email, you will receive a password reset link shortly. Please check your inbox and spam folder.';
      msgEl.className = 'msg success';
      document.getElementById('forgotForm').reset();
    } catch (err) {
      msgEl.textContent = 'Network error. Please try again.';
      msgEl.className = 'msg error';
    }
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  });
})();
</script>
</body>
</html>
