<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Verify Email</title></head>
<body style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:20px">
<h2>Verify your email</h2>
<p>Hi {{.DisplayName}},</p>
<p>Click the button below to verify your email address:</p>
<p><a href="{{.VerifyURL}}" style="display:inline-block;background:#14a3a0;color:#fff;padding:12px 24px;text-decoration:none;border-radius:6px">Verify Email</a></p>
<p>Or copy this link: <br><a href="{{.VerifyURL}}">{{.VerifyURL}}</a></p>
<p>This link expires in 24 hours.</p>
</body>
</html>
