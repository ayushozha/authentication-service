        client_id:
          type: string
        name:
          type: string
        description:
          type: string
        scopes:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, disabled]
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ServiceAccountKey:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        service_account_id:
          type: string
        name:
          type: string
        key_prefix:
          type: string
          description: Non-secret prefix for identifying keys in logs and dashboards.
        scopes:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, revoked]
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ServiceAccountKeyWithSecret:
      type: object
      properties:
        service_account:
          $ref: "#/components/schemas/ServiceAccount"
        key:
          $ref: "#/components/schemas/ServiceAccountKey"
        client_id:
          type: string
          description: Service account ID to send as OAuth client_id.
        client_secret:
          type: string
          description: Raw secret. Returned once and never stored in plaintext.

    ServiceAccountListResponse:
      type: object
      properties:
        service_accounts:
          type: array
          items:
            $ref: "#/components/schemas/ServiceAccount"

    ServiceAccountKeyListResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/ServiceAccountKey"

    M2MTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
        scope:
          type: string
          example: invoices:read

    M2MIntrospectionResponse:
      type: object
      properties:
        active:
          type: boolean
        client_id:
          type: string
        sub:
          type: string
        token_use:
          type: string
          enum: [client_credentials]
        scope:
          type: string
        scopes:
          type: array
          items:
            type: string
        service_account_id:
          type: string
        service_account_name:
          type: string
        exp:
          type: integer
          format: int64
        iat:
          type: integer
          format: int64
        jti:
          type: string
        error:
          type: string

    Client:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        allowed_origins:
          type: array
          items:
            type: string
        webhook_url:
          type: string
          nullable: true
          description: Receives signed `audit.event` webhooks when webhook delivery is enabled
        settings:
          type: object
        status:
          type: string
          enum: [active, suspended]
        token_mode:
          type: string
          enum: [v1_hs256, v2_jwks]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateClientResponse:
      type: object
      properties:
        client:
          $ref: "#/components/schemas/Client"
        api_key:
          type: string
          description: Client API key — save this, shown only at creation
        jwt_secret:
          type: string
          description: JWT signing secret — save this, shown only at creation

    RotateSecretResponse:
      type: object
      properties:
        client:
          $ref: "#/components/schemas/Client"
        jwt_secret:
          type: string
          description: New JWT secret

    RotateKeyResponse:
      type: object
      properties:
        client:
          $ref: "#/components/schemas/Client"
        api_key:
          type: string
          description: New API key

    AuditEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"

    AuditEvent:
      type: object
      properties:
        id:
          type: integer
          format: int64
        client_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        event_type:
          type: string
          example: login_success
        ip_address:
          type: string
          example: 203.0.113.10
        user_agent:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    TOTPSetupResponse:
      type: object
      properties:
        secret:
          type: string
          description: Base32-encoded TOTP secret
        uri:
          type: string
          description: "otpauth:// URI for QR code generation"
        qr:
          type: string
          description: Base64-encoded PNG QR code image

    Passkey:
      type: object
      properties:
        id:
          type: string
          description: Credential ID
        public_key:
          type: string
        counter:
          type: integer
        created_at:
          type: string
          format: date-time

    PasskeyCreationOptions:
      type: object
      description: WebAuthn PublicKeyCredentialCreationOptions — pass to navigator.credentials.create()
      properties:
        public_key:
          type: object
          properties:
            challenge:
              type: string
              description: Base64url-encoded challenge
            rp:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
            user:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                displayName:
                  type: string
            pubKeyCredParams:
              type: array
              items:
                type: object
                properties:
                  alg:
                    type: integer
                  type:
                    type: string
            timeout:
              type: integer
            attestation:
              type: string

    PasskeyRequestOptions:
      type: object
      description: WebAuthn PublicKeyCredentialRequestOptions — pass to navigator.credentials.get()
      properties:
        public_key:
          type: object
          properties:
            challenge:
              type: string
            timeout:
              type: integer
            rpId:
              type: string
            userVerification:
              type: string
            allowCredentials:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  type:
                    type: string
        session_id:
          type: string
          description: Pass this to the login/finish endpoint

    WebAuthnAttestationResponse:
      type: object
      description: Browser attestation response from navigator.credentials.create()
      properties:
        id:
          type: string
        rawId:
          type: string
        response:
          type: object
          properties:
            clientDataJSON:
              type: string
            attestationObject:
              type: string
        type:
          type: string
          example: public-key

    WebAuthnAssertionResponse:
      type: object
      description: Browser assertion response from navigator.credentials.get()
      properties:
        id:
          type: string
        rawId:
          type: string
        response:
          type: object
          properties:
            clientDataJSON:
              type: string
            authenticatorData:
              type: string
            signature:
              type: string
        type:
          type: string
          example: public-key

    JWKS:
      type: object
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kty:
                type: string
                example: RSA
              kid:
                type: string
              use:
                type: string
                example: sig
              alg:
                type: string
                example: RS256
              "n":
                type: string
                description: Base64url-encoded RSA modulus
              e:
                type: string
                description: Base64url-encoded RSA exponent
