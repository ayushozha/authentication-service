          type: string
          description: Raw SCIM bearer token. Returned once.

    SCIMDirectoryListResponse:
      type: array
      items:
        $ref: "#/components/schemas/SCIMDirectory"

    SCIMUser:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:schemas:core:2.0:User"]
        id:
          type: string
          readOnly: true
        externalId:
          type: string
        userName:
          type: string
          format: email
        active:
          type: boolean
        displayName:
          type: string
        name:
          type: object
          properties:
            formatted:
              type: string
            givenName:
              type: string
            familyName:
              type: string
        emails:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
                format: email
              type:
                type: string
              primary:
                type: boolean
        meta:
          $ref: "#/components/schemas/SCIMMeta"

    SCIMGroup:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:schemas:core:2.0:Group"]
        id:
          type: string
          readOnly: true
        externalId:
          type: string
        displayName:
          type: string
        members:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              $ref:
                type: string
              display:
                type: string
        meta:
          $ref: "#/components/schemas/SCIMMeta"

    SCIMMeta:
      type: object
      properties:
        resourceType:
          type: string
        created:
          type: string
          format: date-time
        lastModified:
          type: string
          format: date-time
        location:
          type: string

    SCIMListResponse:
      type: object
      properties:
