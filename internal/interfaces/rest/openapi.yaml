  # ──────────────────────────────────────────────
  # Admin
  # ──────────────────────────────────────────────
  /api/admin/clients:
    post:
      operationId: createClient
      summary: Register a new client
      description: |
        Creates a new tenant (client) and returns the API key and JWT secret. **Save these values** — they are only shown at creation time.
      tags: [Admin]
      x-codeSamples:
        - lang: cURL
          label: Provision a production client
          source: |
            curl -X POST https://authservice.ayushojha.com/api/admin/clients \
              -H "X-Admin-Key: $AUTH_SERVICE_ADMIN_KEY" \
              -H "Content-Type: application/json" \
              -d '{
                "name": "Acme Dashboard",
                "slug": "acme-dashboard-prod",
                "allowed_origins": ["https://app.acme.com"],
                "webhook_url": "https://app.acme.com/webhooks/auth"
              }'
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
            examples:
              productionWebApp:
                summary: Production web application client
                value:
                  name: Acme Dashboard
                  slug: acme-dashboard-prod
                  allowed_origins:
                    - https://app.acme.com
                    - https://www.acme.com
                  webhook_url: https://app.acme.com/webhooks/auth
              stagingEnvironment:
                summary: Separate staging client for safer testing
                value:
                  name: Acme Dashboard Staging
                  slug: acme-dashboard-staging
                  allowed_origins:
                    - https://staging.acme.com
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClientResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listClients
      summary: List all clients
      description: Returns all registered clients.
      tags: [Admin]
      security:
        - AdminKeyAuth: []
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
        "401":
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/clients/{id}:
    get:
      operationId: getClient
      summary: Get a client by ID
      description: Returns a single client's details.
      tags: [Admin]
      security:
        - AdminKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "401":
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateClient
      summary: Update a client
      description: Updates mutable client settings such as allowed origins, webhook URL, status, and tenant WebAuthn policy controls.
      tags: [Admin]
      security:
        - AdminKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
            example:
              settings:
                webauthn_attestation: direct
                webauthn_require_attestation: true
                webauthn_allowed_attestation_formats: [packed, tpm, apple]
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/clients/{id}/rotate-jwt:
    post:
      operationId: rotateJwtSecret
      summary: Rotate JWT secret (alias)
      description: |
        Alias for `/api/admin/clients/{id}/rotate-secret`. Generates a new JWT secret for the client. The old secret is immediately invalidated — all existing tokens signed with it will fail validation.
      tags: [Admin]
      security:
        - AdminKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: New JWT secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateSecretResponse"
        "401":
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/clients/{id}/rotate-secret:
    post:
      operationId: rotateJwtSecretCanonical
      summary: Rotate JWT secret
      description: |
        Generates a new JWT secret for the client. The old secret is immediately invalidated — all existing tokens signed with it will fail validation.

        Use this during incident response, tenant ownership changes, or planned signing-secret rotation.
      tags: [Admin]
      security:
        - AdminKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: New JWT secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateSecretResponse"
        "401":
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/clients/{id}/rotate-key:
    post:
      operationId: rotateApiKey
      summary: Rotate API key (alias)
      description: |
        Alias for `/api/admin/clients/{id}/rotate-api-key`. Generates a new API key for the client. The old key is immediately invalidated.
      tags: [Admin]
      security:
        - AdminKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: New API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateKeyResponse"
        "401":
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/clients/{id}/rotate-api-key:
    post:
      operationId: rotateApiKeyCanonical
      summary: Rotate API key
      description: |
        Generates a new API key for the client. The old key is immediately invalidated.

        Use this if a client API key was exposed in an untrusted surface, checked into source control, or transferred to a new owner.
      tags: [Admin]
      security:
        - AdminKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: New API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateKeyResponse"
        "401":
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/audit-events:
    get:
      operationId: listAuditEvents
      summary: Query audit events
      description: Returns authentication audit events, newest first. Use filters to narrow by tenant, user, or event type.
      tags: [Admin]
      x-codeSamples:
        - lang: cURL
          label: Review recent failed logins for a client
          source: |
            curl "https://authservice.ayushojha.com/api/admin/audit-events?client_id=$CLIENT_ID&event_type=login_failed&limit=100" \
              -H "X-Admin-Key: $AUTH_SERVICE_ADMIN_KEY"
      security:
        - AdminKeyAuth: []
      parameters:
        - name: client_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter events for a client/tenant
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter events for a user
        - name: event_type
          in: query
          required: false
          schema:
            type: string
          description: Filter by event type, for example `signup`, `login_success`, or `totp_enabled`
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Maximum number of events to return
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventsResponse"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/audit-events/export:
    get:
      operationId: exportAuditEvents
      summary: Export audit events
      description: Exports filtered audit events as CSV or newline-delimited JSON for security reviews, customer evidence requests, and offline retention.
      tags: [Admin]
      x-codeSamples:
        - lang: cURL
          label: Export recent audit evidence as CSV
          source: |
            curl "https://authservice.ayushojha.com/api/admin/audit-events/export?client_id=$CLIENT_ID&format=csv&limit=500" \
              -H "X-Admin-Key: $AUTH_SERVICE_ADMIN_KEY" \
              -o authservice-audit-events.csv
      security:
        - AdminKeyAuth: []
      parameters:
        - name: client_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter events for a client/tenant
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter events for a user
        - name: event_type
          in: query
          required: false
          schema:
            type: string
          description: Filter by event type
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Maximum number of events to export
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [csv, jsonl, ndjson]
            default: csv
          description: Export format. `jsonl` and `ndjson` both return `application/x-ndjson`.
      responses:
        "200":
          description: Audit export
          content:
            text/csv:
              schema:
                type: string
            application/x-ndjson:
              schema:
                type: string
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ──────────────────────────────────────────────
  # Utility
  # ──────────────────────────────────────────────
  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns service health status.
      tags: [Utility]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /.well-known/jwks.json:
    get:
      operationId: getJwks
      summary: Get JSON Web Key Set
      description: |
        Returns public signing keys used to validate RS256-signed tokens.

        Without a client hint, the endpoint returns the issuer-level active JWKS. Provide either `X-API-Key` or `client_id` to narrow the response to one client.
      tags: [Utility]
      x-codeSamples:
        - lang: cURL
          label: Fetch client-scoped signing keys
          source: |
            curl "https://authservice.ayushojha.com/.well-known/jwks.json?client_id=$CLIENT_ID"
      parameters:
        - name: X-API-Key
          in: header
          required: false
          schema:
            type: string
          description: Client API key for client-scoped JWKS lookup
        - name: client_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Client ID (alternative to X-API-Key header)
      responses:
        "200":
          description: JWKS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JWKS"
        "401":
          description: Invalid client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: JWKS could not be loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Client API key — identifies the tenant
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User access token (JWT)
    SCIMBearerAuth:
      type: http
      scheme: bearer
      description: Per-directory SCIM provisioning token
    AdminKeyAuth:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: Master admin key for client management

  parameters:
    ClientIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Client ID
    OrganizationID:
      name: org_id
      in: path
      required: true
      schema:
        type: string
      description: Organization ID
    ServiceAccountID:
      name: service_account_id
      in: path
      required: true
      schema:
        type: string
      description: Service account ID used as OAuth client_id
    ServiceAccountKeyID:
      name: key_id
      in: path
      required: true
      schema:
        type: string
      description: Service account key ID
    SSOConnectionID:
      name: sso_connection_id
      in: path
      required: true
      schema:
        type: string
      description: Enterprise SSO connection ID or slug where supported
    SCIMDirectoryID:
      name: scim_directory_id
      in: path
      required: true
      schema:
        type: string
      description: SCIM directory ID
    SCIMUserID:
      name: scim_user_id
      in: path
      required: true
      schema:
        type: string
      description: SCIM user resource ID
    SCIMGroupID:
      name: scim_group_id
      in: path
      required: true
      schema:
        type: string
      description: SCIM group resource ID

  schemas:
    # ── Requests ──────────────────────────────
    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          description: Password (8-72 characters, bcrypt limit)
          example: MySecurePass123
        display_name:
          type: string
          description: Display name (defaults to email prefix)
          example: John Doe
        session_mode:
          type: string
          enum: [token]
          description: Set to `token` to receive refresh token in JSON instead of cookie
        captcha_token:
          type: string
          description: Required when `CAPTCHA_SIGNUP_REQUIRED=true`

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: MySecurePass123
        session_mode:
          type: string
          enum: [token]
          description: Set to `token` to receive refresh token in JSON instead of cookie
        captcha_token:
          type: string
          description: Required when `CAPTCHA_LOGIN_REQUIRED=true`

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Refresh token (required in token mode)
        session_mode:
          type: string
          enum: [token]

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Refresh token to revoke when using token session mode

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
          description: Current password
        new_password:
          type: string
          minLength: 8
          maxLength: 72
          description: New password (8-72 characters)

    UpdateProfileRequest:
      type: object
      properties:
        display_name:
          type: string
          description: New display name
          example: Jane Doe
        timezone:
          type: string
          description: IANA timezone
          example: America/New_York

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
          description: Reset token from email
        new_password:
          type: string
          minLength: 8
          maxLength: 72
          description: New password (8-72 characters)

    TOTPVerifyRequest:
      type: object
      required: [two_factor_token, code]
      properties:
        two_factor_token:
          type: string
          description: Token from login response when 2FA is required
        code:
          type: string
          description: 6-digit TOTP code from authenticator app
          example: "123456"
        session_mode:
          type: string
          enum: [token]

    RecoveryCodeVerifyRequest:
      type: object
      required: [two_factor_token, code]
      properties:
        two_factor_token:
          type: string
          description: Token from login response when 2FA is required
        code:
          type: string
          description: One-time recovery code generated after TOTP enrollment
          example: ABCD-1234-EF56
        session_mode:
          type: string
          enum: [token]

    RecoveryCodesResponse:
      type: object
      properties:
        recovery_codes:
          type: array
          description: Newly generated one-time codes. Present only immediately after rotation.
          items:
            type: string
          example: [ABCD-1234-EF56, "9876-ABCD-4321"]
        unused_count:
          type: integer
          description: Count of unused recovery codes
          example: 10

    CreateOrganizationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 128
          example: Acme Inc
        slug:
          type: string
          maxLength: 80
          description: URL-safe slug. Defaults to a normalized version of name.
          example: acme-inc

    UpdateOrganizationRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 128
          example: Acme Corp
        slug:
          type: string
          maxLength: 80
          example: acme-corp

    InviteOrganizationMemberRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: teammate@acme.com
        role:
          $ref: "#/components/schemas/OrganizationRole"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationPermission"
          description: Optional custom permissions. Omit to use the role defaults.
        expires_in_hours:
          type: integer
          minimum: 1
          maximum: 720
          default: 168

    UpdateOrganizationMemberRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/OrganizationRole"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationPermission"
          description: Optional custom permissions. Omit to use the role defaults.

    AcceptOrganizationInvitationRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Raw invitation token returned at invite creation.

    CreateServiceAccountRequest:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
          maxLength: 128
          example: Billing Worker
        description:
          type: string
          maxLength: 512
        scopes:
          type: array
          items:
            type: string
          example: ["invoices:read", "invoices:write"]

    UpdateServiceAccountRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 128
        description:
          type: string
          maxLength: 512
        scopes:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, disabled]

    CreateServiceAccountKeyRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 128
          example: read-only deploy key
        scopes:
          type: array
          items:
            type: string
          description: Must be a subset of the parent service account scopes. Omit to inherit all account scopes.
        expires_in_hours:
          type: integer
          minimum: 1
          description: Optional key expiry.

    OIDCConnectionConfig:
      type: object
      properties:
        issuer:
          type: string
          format: uri
          example: https://acme.okta.com/oauth2/default
        client_id:
          type: string
        client_secret:
          type: string
          writeOnly: true
        scopes:
          type: array
          items:
            type: string
          default: [openid, email, profile]

    SAMLConnectionConfig:
      type: object
      properties:
        idp_entity_id:
          type: string
          example: https://idp.example.com/metadata
        idp_sso_url:
          type: string
          format: uri
        idp_certificate:
          type: string
          description: Base64 DER X.509 signing certificate. PEM input is accepted by the API and normalized.
        idp_metadata_xml:
          type: string
          description: Optional IdP metadata XML. If supplied, entity ID, SSO URL, and signing certs can be read from metadata.
        sp_entity_id:
          type: string
          description: Service provider entity ID. Defaults to the generated metadata URL.
        sp_metadata_url:
          type: string
          format: uri
          readOnly: true
        acs_url:
          type: string
          format: uri
          readOnly: true
        sp_certificate_pem:
          type: string
          readOnly: true
          description: Generated SP certificate to upload through metadata when needed.

    CreateEnterpriseSSOConnectionRequest:
      type: object
      required: [name, protocol]
      properties:
        name:
          type: string
          example: Acme Okta
        slug:
          type: string
          example: acme-okta
        protocol:
          type: string
          enum: [oidc, saml]
        status:
          type: string
          enum: [active, inactive]
          default: active
        domains:
          type: array
          items:
            type: string
          example: [acme.com]
        enforce_for_domains:
          type: boolean
          default: false
        oidc:
          $ref: "#/components/schemas/OIDCConnectionConfig"
        saml:
          $ref: "#/components/schemas/SAMLConnectionConfig"
        attribute_mapping:
          type: object
          additionalProperties:
            type: string
          description: Maps local fields such as `email`, `name`, and `external_id` to SAML attribute names.

    UpdateEnterpriseSSOConnectionRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, inactive]
        domains:
          type: array
          items:
            type: string
        enforce_for_domains:
          type: boolean
        oidc:
          $ref: "#/components/schemas/OIDCConnectionConfig"
        saml:
          $ref: "#/components/schemas/SAMLConnectionConfig"
        attribute_mapping:
          type: object
          additionalProperties:
            type: string

    SAMLCallbackRequest:
      type: object
      required: [SAMLResponse, RelayState]
      properties:
        SAMLResponse:
          type: string
          description: Base64-encoded SAML response from the IdP.
        RelayState:
          type: string
          description: Opaque state returned from the SAML AuthnRequest.

    CreateSCIMDirectoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Acme Directory
        domains:
          type: array
          items:
            type: string
          description: Optional allowed email domains for provisioned users.

    UpdateSCIMDirectoryRequest:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, disabled]
        domains:
          type: array
          items:
            type: string

    SCIMPatchRequest:
      type: object
      required: [Operations]
      properties:
        schemas:
          type: array
          items:
            type: string
        Operations:
          type: array
          items:
            type: object
            required: [op]
            properties:
              op:
                type: string
                enum: [add, replace, remove]
              path:
                type: string
              value: {}

    ClientCredentialsRequest:
      type: object
      required: [grant_type, client_id, client_secret]
      properties:
        grant_type:
          type: string
          enum: [client_credentials]
        client_id:
          type: string
          description: Service account ID.
        client_secret:
          type: string
          description: One-time secret returned when creating or rotating a service account key.
        scope:
          type: string
          description: Space-delimited requested scopes. Omit to request all allowed scopes.
          example: invoices:read

    TokenIntrospectionRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
        client_id:
          type: string
          description: Service account ID. May be supplied through HTTP Basic auth instead.
        client_secret:
          type: string
          description: Service account secret. May be supplied through HTTP Basic auth instead.

    CreateClientRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          description: Human-readable project name
          example: My SaaS App
        slug:
          type: string
          description: Unique identifier (URL-safe)
          example: my-saas-app
        allowed_origins:
          type: array
          items:
            type: string
          description: Allowed CORS origins
          example: ["https://myapp.com", "https://www.myapp.com"]
        webhook_url:
          type: string
          format: uri
          description: Webhook URL for signed audit-event deliveries when `WEBHOOK_SIGNING_SECRET` is configured
          example: https://myapp.com/webhooks/auth
        settings:
          type: object
          description: Tenant settings. WebAuthn policy keys include `webauthn_attestation`, `webauthn_require_attestation`, and `webauthn_allowed_attestation_formats`.
          additionalProperties: true

    UpdateClientRequest:
      type: object
      properties:
        name:
          type: string
        allowed_origins:
          type: array
          items:
            type: string
        webhook_url:
          type: string
          format: uri
        status:
          type: string
          enum: [active, suspended]
        settings:
          type: object
          additionalProperties: true
          description: Replaces the client settings object when supplied.

    # ── Responses ─────────────────────────────
    OkResponse:
      type: object
      properties:
        ok:
          type: string
          example: "true"

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: invalid request

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token (15 min TTL)
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
          description: Token lifetime in seconds
        user:
          $ref: "#/components/schemas/User"
        refresh_token:
          type: string
          description: Refresh token (only present in token session mode)
        risk:
          $ref: "#/components/schemas/LoginRisk"

    TwoFactorChallenge:
      type: object
      properties:
        requires_2fa:
          type: boolean
          example: true
        two_factor_token:
          type: string
          description: Pass this to the TOTP verify endpoint
        two_factor_methods:
          type: array
          items:
            type: string
          example: ["totp", "recovery_code"]
        risk:
          $ref: "#/components/schemas/LoginRisk"

    LoginRisk:
      type: object
      description: Present when a login is considered suspicious and should be surfaced to the user or security team.
      properties:
        level:
          type: string
          enum: [low, medium]
          example: medium
        reasons:
          type: array
          items:
            type: string
            enum: [new_ip, new_device]
          example: [new_ip, new_device]
        new_ip:
          type: boolean
        new_device:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        display_name:
          type: string
        avatar_url:
          type: string
          nullable: true
        timezone:
          type: string
          example: UTC
        locale:
          type: string
          example: en
        role:
          type: string
          example: user
        status:
          type: string
          enum: [active, suspended, deleted]
        totp_enabled:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Session:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        client_id:
          type: string
        user_agent:
          type: string
        ip_address:
          type: string
        expires_at:
          type: string
          format: date-time
        revoked:
          type: boolean
        created_at:
          type: string
          format: date-time

    SessionListResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/Session"

    OrganizationRole:
      type: string
      enum: [owner, admin, member, viewer]
      default: member

    OrganizationPermission:
      type: string
      enum:
        - org:read
        - org:write
        - members:read
        - members:write
        - invitations:read
        - invitations:write

    Organization:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        name:
          type: string
        slug:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_by_user_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrganizationMembership:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        organization_id:
          type: string
        user_id:
          type: string
        role:
          $ref: "#/components/schemas/OrganizationRole"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationPermission"
        status:
          type: string
          enum: [active]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrganizationMembershipDetails:
      type: object
      properties:
        organization:
          $ref: "#/components/schemas/Organization"
        membership:
          $ref: "#/components/schemas/OrganizationMembership"

    OrganizationInvitation:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        organization_id:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/OrganizationRole"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationPermission"
        status:
          type: string
          enum: [pending, accepted, revoked]
        invited_by_user_id:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrganizationInvitationWithToken:
      type: object
      properties:
        invitation:
          $ref: "#/components/schemas/OrganizationInvitation"
        token:
          type: string
          description: Raw invitation token. Returned once.

    OrganizationListResponse:
      type: object
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationMembershipDetails"

    OrganizationMembersResponse:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationMembership"

    OrganizationInvitationsResponse:
      type: object
      properties:
        invitations:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationInvitation"

    OrganizationTokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT containing organization claims
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900

    EnterpriseSSOConnection:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        name:
          type: string
        slug:
          type: string
        protocol:
          type: string
          enum: [oidc, saml]
        status:
          type: string
          enum: [active, inactive]
        domains:
          type: array
          items:
            type: string
        enforce_for_domains:
          type: boolean
        oidc:
          $ref: "#/components/schemas/OIDCConnectionConfig"
        saml:
          $ref: "#/components/schemas/SAMLConnectionConfig"
        attribute_mapping:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EnterpriseSSOConnectionListResponse:
      type: array
      items:
        $ref: "#/components/schemas/EnterpriseSSOConnection"

    SCIMDirectory:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, disabled]
        token_prefix:
          type: string
          description: Non-secret token prefix for identifying the active SCIM token.
        domains:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SCIMDirectoryWithToken:
      type: object
      properties:
