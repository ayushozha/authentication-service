syntax = "proto3";
package auth.v1;
option go_package = "github.com/Ayush10/authentication-service/proto/auth/v1";

// TokenService provides token validation for other microservices.
service TokenService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message ValidateTokenRequest {
  string access_token = 1;
  string api_key = 2;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string email = 3;
  string role = 4;
  bool email_verified = 5;
  string client_id = 6;
  string error = 7;
  string org_id = 8;
  string org_slug = 9;
  string org_role = 10;
  repeated string org_permissions = 11;
  string token_use = 12;
  string scope = 13;
  repeated string scopes = 14;
  string service_account_id = 15;
  string service_account_name = 16;
}
