services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    expose:
      - "8080"
      - "9090"
    environment:
      PORT: "8080"
      GRPC_PORT: "9090"
      PUBLIC_DIR: "/app/public"
      SERVE_FRONTEND: "true"
      ALLOW_ORIGIN: "${ALLOW_ORIGIN:-*}"
      DATABASE_URL: "${DATABASE_URL:-postgres://<db_user>:<db_password>@projects-db:5432/auth_service?sslmode=disable}"
      REDIS_URL: "${REDIS_URL:-redis://<redis_user>:<redis_password>@projects-redis:6379/0}"
      REDIS_KEY_PREFIX: "auth:"
      ADMIN_API_KEY: "${ADMIN_API_KEY}"
      BASE_URL: "${BASE_URL:-https://authservice.ayushojha.com}"
      JWT_ACCESS_TTL: "${JWT_ACCESS_TTL:-15m}"
      JWT_REFRESH_TTL: "${JWT_REFRESH_TTL:-168h}"
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
      COOKIE_SAMESITE: "${COOKIE_SAMESITE:-none}"
      COOKIE_DOMAIN: "${COOKIE_DOMAIN:-}"
      BCRYPT_COST: "${BCRYPT_COST:-12}"
      PASSWORD_MIN_LENGTH: "${PASSWORD_MIN_LENGTH:-8}"
      PASSWORD_MAX_LENGTH: "${PASSWORD_MAX_LENGTH:-72}"
      PASSWORD_MIN_UNIQUE: "${PASSWORD_MIN_UNIQUE:-4}"
      PASSWORD_BLOCK_COMMON: "${PASSWORD_BLOCK_COMMON:-true}"
      PASSWORD_BLOCK_USER_INFO: "${PASSWORD_BLOCK_USER_INFO:-true}"
      BLOCKED_EMAIL_DOMAINS: "${BLOCKED_EMAIL_DOMAINS:-10minutemail.com,dispostable.com,guerrillamail.com,guerrillamail.net,mailinator.com,maildrop.cc,sharklasers.com,tempmail.com,throwawaymail.com,yopmail.com}"
      WEBHOOK_SIGNING_SECRET: "${WEBHOOK_SIGNING_SECRET:-}"
      WEBHOOK_RETRY_ATTEMPTS: "${WEBHOOK_RETRY_ATTEMPTS:-3}"
      WEBHOOK_TIMEOUT: "${WEBHOOK_TIMEOUT:-5s}"
      CAPTCHA_PROVIDER: "${CAPTCHA_PROVIDER:-}"
      CAPTCHA_SECRET: "${CAPTCHA_SECRET:-}"
      CAPTCHA_VERIFY_URL: "${CAPTCHA_VERIFY_URL:-}"
      CAPTCHA_TIMEOUT: "${CAPTCHA_TIMEOUT:-5s}"
      CAPTCHA_SIGNUP_REQUIRED: "${CAPTCHA_SIGNUP_REQUIRED:-false}"
      CAPTCHA_LOGIN_REQUIRED: "${CAPTCHA_LOGIN_REQUIRED:-false}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM: "${EMAIL_FROM:-Auth Service <noreply@ayushojha.com>}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URL: "${GOOGLE_REDIRECT_URL:-https://authservice.ayushojha.com/api/auth/oauth/google/callback}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      GITHUB_REDIRECT_URL: "${GITHUB_REDIRECT_URL:-https://authservice.ayushojha.com/api/auth/oauth/github/callback}"
      MICROSOFT_CLIENT_ID: "${MICROSOFT_CLIENT_ID:-}"
      MICROSOFT_CLIENT_SECRET: "${MICROSOFT_CLIENT_SECRET:-}"
      MICROSOFT_TENANT_ID: "${MICROSOFT_TENANT_ID:-common}"
      MICROSOFT_REDIRECT_URL: "${MICROSOFT_REDIRECT_URL:-https://authservice.ayushojha.com/api/auth/oauth/microsoft/callback}"
      APPLE_CLIENT_ID: "${APPLE_CLIENT_ID:-}"
      APPLE_REDIRECT_URL: "${APPLE_REDIRECT_URL:-https://authservice.ayushojha.com/api/auth/oauth/apple/callback}"
      WEBAUTHN_RP_ID: "${WEBAUTHN_RP_ID:-authservice.ayushojha.com}"
      WEBAUTHN_RP_ORIGIN: "${WEBAUTHN_RP_ORIGIN:-https://authservice.ayushojha.com}"
      WEBAUTHN_DISPLAY_NAME: "${WEBAUTHN_DISPLAY_NAME:-Auth Service}"
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.middlewares.gzip-auth.compress=true
      - traefik.http.middlewares.redirect-to-https-auth.redirectscheme.scheme=https
      - traefik.http.routers.http-auth.entryPoints=http
      - traefik.http.routers.http-auth.middlewares=redirect-to-https-auth
      - "traefik.http.routers.http-auth.rule=Host(`authservice.ayushojha.com`)"
      - traefik.http.routers.https-auth.entryPoints=https
      - traefik.http.routers.https-auth.middlewares=gzip-auth
      - "traefik.http.routers.https-auth.rule=Host(`authservice.ayushojha.com`)"
      - traefik.http.routers.https-auth.tls=true
      - traefik.http.routers.https-auth.tls.certresolver=letsencrypt
      - traefik.http.services.auth-service.loadbalancer.server.port=8080

networks:
  coolify:
    external: true
